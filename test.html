<!DOCTYPE html>
<html style="min-height: 100vh">
<head>
    <meta charset="utf-8">
    <title>Генератор кнопок</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript">
        function need(form) {
            alert(form.value);
        }
    </script>
</head>
<body style="min-height: 100vh">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 col-sm-2 col-xs-2 col-lg-2" style="background-color: lime; min-height: 100vh">
                <img src="logo.png" width="200px" height="200px">
                <h3 class="comics">FortiBrine</h3>
            </div>
            <div class="col-md-8 col-sm-8 col-xs-8 col-lg-8" style="background-color: red">
                <iframe src="https://console.python.org/python-dot-org-console/" style="width: 100%; height: 300px;"></iframe>
                <input type="color" id="date" style="width: 125px; height: 125px; border-radius: 25s"><br><br>
                <button class="butt butt1" onclick="need(document.getElementById('date'))">Определить</button>
            </div>
            <div class="col-md-2 col-sm-2 col-xs-2 col-lg-2" style="background-color: lime; min-height: 100vh">
                
            </div>
        </div>
    </div>
</body>
</html>
